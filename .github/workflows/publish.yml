name: Publish to npm

# Publish flow:
#   1. Push a git tag `v<x.y.z>` matching package.json's "version" field.
#   2. CI checks out, installs, typechecks, runs unit tests, builds.
#   3. `npm publish --provenance --tag beta` publishes the version AND
#      atomically sets the `beta` dist-tag via the OIDC-authenticated
#      Trusted Publisher token (no long-lived secret needed).
#   4. `npm dist-tag add opencode-windsurf-auth@<v> latest` then ALSO
#      points `latest` at the new version, using the long-lived
#      `NPM_TOKEN` (an MFA-bypass automation token scoped to this
#      package). `continue-on-error: true` so this step failing
#      doesn't break the publish itself — `beta` will already be on
#      the new version.
#
# Result: every release sets BOTH `latest` and `beta` to the new
# version. Users on either dist-tag are kept current.
#
# Manual override: `workflow_dispatch` (with optional `dry_run`) lets you
# rehearse the pipeline without publishing.
#
# Auth:
#   - `npm publish --tag beta` uses npm Trusted Publisher (OIDC). No
#     long-lived secret — `id-token: write` is the only permission needed.
#     Configure the publisher once at:
#       https://www.npmjs.com/package/opencode-windsurf-auth/access
#     Publisher = GitHub Actions, org = rsvedant,
#     repo = opencode-windsurf-auth, workflow filename = publish.yml.
#   - `npm dist-tag add` (the second step) needs `NPM_TOKEN` because
#     npm Trusted Publisher OIDC tokens are scoped to `publish` only.
#     Token is a granular access token scoped to this package, with
#     MFA-bypass enabled (the only token type that works unattended in
#     CI; classic granular tokens require 2FA OTP for dist-tag).
#     Create at: https://www.npmjs.com/settings/<user>/tokens/granular-access-tokens/new
#     Save as `NPM_TOKEN` in the repo's Actions secrets.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip the publish step (rehearsal only)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # required for `npm publish --provenance` (sigstore)

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, publish & tag beta
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Setup Node (npm + provenance)
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm >= 11.5.1 for OIDC Trusted Publisher auth
        run: npm install -g npm@latest && npm --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve and verify version
        id: version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
              echo "::error::Git tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
              exit 1
            fi
          fi
          echo "version=${PKG_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Resolved version: ${PKG_VERSION}"

      - name: Refuse to publish a version that already exists
        if: ${{ inputs.dry_run != true }}
        run: |
          if npm view "opencode-windsurf-auth@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "::error::opencode-windsurf-auth@${{ steps.version.outputs.version }} is already published. Bump package.json and re-tag."
            exit 1
          fi

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test tests/unit

      - name: Build
        run: bun run build

      - name: Publish to npm (beta via OIDC)
        if: ${{ inputs.dry_run != true }}
        # `npm publish --tag beta` atomically sets the `beta` dist-tag using
        # the OIDC-authenticated Trusted Publisher token. No long-lived
        # secret needed for this step.
        run: npm publish --provenance --access public --tag beta

      - name: Also point `latest` at this version
        if: ${{ inputs.dry_run != true }}
        # npm Trusted Publisher OIDC tokens are scoped to `publish` only and
        # can't be reused for `dist-tag add`, so this step uses the long-
        # lived `NPM_TOKEN` automation token (scoped to this package with
        # MFA-bypass enabled — see GitHub repo secrets).
        #
        # Skipping this step still leaves a valid release on npm — `beta`
        # will be updated by the previous step. If this step fails (e.g.,
        # token expired), the publish itself is unaffected.
        continue-on-error: true
        run: |
          npm dist-tag add "opencode-windsurf-auth@${{ steps.version.outputs.version }}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          {
            echo "## opencode-windsurf-auth publish"
            echo ""
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "**Dry run** — would have published \`${{ steps.version.outputs.version }}\` and pointed both \`beta\` + \`latest\` at it."
            else
              echo "Published \`opencode-windsurf-auth@${{ steps.version.outputs.version }}\`."
              echo ""
              echo "| dist-tag | version |"
              echo "|----------|---------|"
              echo "| latest   | ${{ steps.version.outputs.version }} |"
              echo "| beta     | ${{ steps.version.outputs.version }} |"
              echo ""
              echo "Install:"
              echo "- \`bun add opencode-windsurf-auth\` (latest)"
              echo "- \`bun add opencode-windsurf-auth@beta\` (beta)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
